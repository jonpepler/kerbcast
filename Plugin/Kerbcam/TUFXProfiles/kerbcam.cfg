// Kerbcam-curated TUFX profile — diagnostic iteration. Strip
// AutoExposure entirely to test whether it was crushing Kerbin's
// surface to black by calibrating to the brilliant atmospheric
// limb. Drop the contrast bump too — could be compounding the
// shadow crush. Keep PostExposure as a constant additive lift and
// modest saturation bump, no per-frame adaptation.

TUFX_PROFILE
{
    name = kerbcam
    hdr = True
    antialiasing = SubpixelMorphologicalAntialiasing
    secondaryAntialiasing = None

    EFFECT
    {
        // Constant +2 stops, ACES tonemap, modest saturation lift.
        // No AutoExposure means scene brightness is whatever the
        // pre-tonemap render produced + 2 stops. If Kerbin's surface
        // appears with this, AutoExposure was over-correcting.
        name = ColorGrading
        GradingMode = HighDefinitionRange
        Tonemapper = ACES
        PostExposure = 2.0
        Saturation = 20
    }
}
