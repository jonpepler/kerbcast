name: plugin-ci

# Builds Kerbcam.dll on every push/PR that touches the plugin.
#
# The KSP Unity assemblies and HullcamVDS plugin are not redistributable and
# live in the private repo jonpepler/ksp-managed. A PAT with read access to
# that repo must be stored as the repository secret KSP_MANAGED_TOKEN.

on:
  push:
    branches:
      - main
      - 'wip/**'
    paths:
      - 'Plugin/**'
      - '.github/workflows/plugin-ci.yml'
  pull_request:
    paths:
      - 'Plugin/**'
      - '.github/workflows/plugin-ci.yml'
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout KSP assemblies
        uses: actions/checkout@v6
        with:
          repository: jonpepler/ksp-managed
          token: ${{ secrets.KSP_MANAGED_TOKEN }}
          path: ksp-managed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Build Kerbcam.dll
        run: |
          dotnet build Plugin/Kerbcam.csproj -c Release \
            /p:KspManaged="${{ github.workspace }}/ksp-managed/KSP_Data/Managed" \
            /p:KspGameData="${{ github.workspace }}/ksp-managed/GameData"

      - name: Upload Kerbcam.dll
        uses: actions/upload-artifact@v7
        with:
          name: kerbcam-plugin
          path: Plugin/obj/Release/Kerbcam.dll
          if-no-files-found: error
