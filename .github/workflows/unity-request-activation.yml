name: Unity license activation request

# One-time manual workflow that produces an Unity activation request
# (.alf) file for the KSP-matching Unity version (2019.4.18f1). Pick it
# up from the run's Artifacts, walk the .alf through Unity's web flow at
# https://license.unity3d.com/manual to get a .ulf back, then paste the
# .ulf into a repo secret named UNITY_LICENSE. After that, the actual
# build-shaders.yml workflow can use that license to drive Unity in
# batchmode.
#
# This workflow does not run automatically — fire it via the Actions tab
# when you need a fresh activation file.

on:
  workflow_dispatch:

jobs:
  request-activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Request Unity activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 2019.4.18f1

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.getManualLicenseFile.outputs.filePath }}
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
