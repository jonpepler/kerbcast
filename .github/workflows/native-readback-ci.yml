name: native-readback-ci

# Builds the VENDORED UnityOpenGLAsyncReadback native plugin
# (Plugin/Vendor/UnityOpenGLAsyncReadback/NativePlugin/, a kerbcam fork — see its
# README) into libAsyncGPUReadbackPlugin.so for the Steam Deck, and uploads it as
# an artifact. Carries kerbcam readback perf changes: #2 (FBO+PBO pooling) and a
# #4 format diagnostic. See local_docs/perf_profiles/readback_investigation.md.
#
# Builds on ubuntu-22.04 ON PURPOSE: glibc 2.35. KSP runs inside Steam's
# pressure-vessel (sniper / glibc 2.36); a .so built on ubuntu-24.04 (glibc
# 2.39) needs GLIBC_2.38 and crashes at load on the Deck. Same constraint as
# sidecar-ci.yml. The glibc-ceiling guard below fails the build if anything
# pulls the requirement above 2.36.

on:
  workflow_dispatch: {}
  push:
    branches:
      - 'spike/**'
      - 'perf/**'
      - 'fix/**'
    paths:
      - '.github/workflows/native-readback-ci.yml'
      - 'Plugin/Vendor/UnityOpenGLAsyncReadback/NativePlugin/**'

permissions:
  contents: read

jobs:
  build:
    name: build libAsyncGPUReadbackPlugin.so
    runs-on: ubuntu-22.04
    env:
      SRC: Plugin/Vendor/UnityOpenGLAsyncReadback/NativePlugin
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ make libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev binutils

      - name: Build
        run: |
          cmake -S "$SRC" -B "$SRC/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenGL_GL_PREFERENCE=LEGACY
          cmake --build "$SRC/build" --config Release -j
          find "$SRC/build" -name '*.so' -print

      - name: glibc ceiling guard (must be <= 2.36)
        run: |
          SO=$(find "$SRC/build" -name 'libAsyncGPUReadbackPlugin.so' | head -1)
          echo "built: $SO"
          echo "=== GLIBC version symbols required ==="
          objdump -T "$SO" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -uV | tee /tmp/glibc.txt
          MAX=$(sort -uV /tmp/glibc.txt | tail -1 | sed 's/GLIBC_//')
          echo "max GLIBC required: $MAX (ceiling 2.36)"
          awk -v m="$MAX" 'BEGIN{ split(m,a,"."); if (a[1]>2 || (a[1]==2 && a[2]>36)) { print "FAIL: needs GLIBC_"m" > 2.36"; exit 1 } print "OK" }'

      - name: Stage artifact
        run: |
          mkdir -p out
          cp "$SRC/build/libAsyncGPUReadbackPlugin.so" out/
          echo "source=vendored ($SRC)" > out/build-info.txt
          echo "git_sha=${GITHUB_SHA}" >> out/build-info.txt
          echo "built_on=ubuntu-22.04 (glibc 2.35)" >> out/build-info.txt
          ( cd out && sha256sum libAsyncGPUReadbackPlugin.so >> build-info.txt )
          cat out/build-info.txt

      - name: Upload .so
        uses: actions/upload-artifact@v7
        with:
          name: libAsyncGPUReadbackPlugin-linux-x64
          path: out/
          if-no-files-found: error
