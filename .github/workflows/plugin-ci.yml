name: plugin-ci

# Builds Kerbcast.dll on every push/PR that touches the plugin.
#
# The KSP Unity assemblies and HullcamVDS plugin are not redistributable and
# live in the private repo ksp-gonogo/ksp-managed. A PAT with read access to
# that repo must be stored as the repository secret KSP_MANAGED_TOKEN.

on:
  push:
    branches:
      - main
      - 'wip/**'
    paths:
      - 'Plugin/**'
      - 'sidecar/testdata/**'
      - '.github/workflows/plugin-ci.yml'
  pull_request:
    paths:
      - 'Plugin/**'
      - 'sidecar/testdata/**'
      - '.github/workflows/plugin-ci.yml'
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout KSP assemblies
        uses: actions/checkout@v6
        with:
          repository: ksp-gonogo/ksp-managed
          token: ${{ secrets.KSP_MANAGED_TOKEN }}
          path: ksp-managed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Build Kerbcast.dll
        run: |
          dotnet build Plugin/Kerbcast.csproj -c Release \
            /p:KspManaged="${{ github.workspace }}/ksp-managed/KSP_Data/Managed" \
            /p:KspGameData="${{ github.workspace }}/ksp-managed/GameData"

      - name: Upload Kerbcast.dll
        uses: actions/upload-artifact@v7
        with:
          name: kerbcast-plugin
          path: Plugin/obj/Release/Kerbcast.dll
          if-no-files-found: error

  # The Plugin/*.Tests projects are Unity-free harnesses (exit 0 = pass):
  # each compiles its unit under test directly, so no KSP assemblies or
  # secrets are needed and they run fine on a plain runner.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Run plugin test harnesses
        run: |
          set -euo pipefail
          for proj in Plugin/*.Tests; do
            # KerbcastKos.Tests is an xunit/net10 project needing kOS + the
            # built addon DLL — not a `dotnet run` exit-0 harness. The
            # kerbcast-kos job builds and `dotnet test`s it instead.
            if [ "$proj" = "Plugin/KerbcastKos.Tests" ]; then
              echo "skipping ${proj} (run by the kerbcast-kos job)"
              continue
            fi
            echo "::group::${proj}"
            dotnet run --project "$proj" -c Release
            echo "::endgroup::"
          done

  # The KerbcastKos addon (Kerbcast.Kos.dll) direct-links kOS + the plugin
  # facade, so it needs the ksp-managed checkout (KSP/Unity + kOS + Hullcam +
  # Harmony). This job builds the addon, then runs the headless kerboscript
  # integration test (real kOS compiler + CPU, Unity-free seam preset to a fake).
  kerbcast-kos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout KSP assemblies
        uses: actions/checkout@v6
        with:
          repository: ksp-gonogo/ksp-managed
          token: ${{ secrets.KSP_MANAGED_TOKEN }}
          path: ksp-managed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build KerbcastKos addon
        run: |
          dotnet build Plugin/KerbcastKos/KerbcastKos.csproj -c Release \
            /p:KspManaged="${{ github.workspace }}/ksp-managed/KSP_Data/Managed" \
            /p:KspGameData="${{ github.workspace }}/ksp-managed/GameData"

      - name: Run headless kerboscript integration test
        run: |
          # Fails loudly rather than silently SKIP if the kOS layout moves —
          # the whole point of this job is to actually exercise the addon.
          test -f "${{ github.workspace }}/ksp-managed/GameData/kOS/Plugins/kOS.dll"
          dotnet test Plugin/KerbcastKos.Tests -c Release \
            /p:KspGameData="${{ github.workspace }}/ksp-managed/GameData"

      - name: Upload Kerbcast.Kos.dll
        uses: actions/upload-artifact@v7
        with:
          name: kerbcast-kos-addon
          path: Plugin/KerbcastKos/bin/Release/Kerbcast.Kos.dll
          if-no-files-found: error

  # HullcamContract.Tests self-SKIPs in the loop above (no DLL on a plain
  # runner); this job feeds it the real HullcamVDSContinued.dll from the
  # ksp-managed checkout so the reflection contract is actually enforced.
  hullcam-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout KSP assemblies
        uses: actions/checkout@v6
        with:
          repository: ksp-gonogo/ksp-managed
          token: ${{ secrets.KSP_MANAGED_TOKEN }}
          path: ksp-managed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Run Hullcam reflection-contract test
        env:
          KERBCAST_HULLCAM_DLL: ${{ github.workspace }}/ksp-managed/GameData/HullCameraVDS/Plugins/HullcamVDSContinued.dll
        run: |
          # Hard-fail rather than silently SKIP if the checkout layout moves.
          test -f "$KERBCAST_HULLCAM_DLL"
          dotnet run --project Plugin/HullcamContract.Tests -c Release
